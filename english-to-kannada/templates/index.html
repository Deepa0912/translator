<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English to Kannada Translator</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #f5576c);
            background-size: 400% 400%;
            animation: gradientShift 4s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.8em;
            color: #333;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .translator-section {
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 1.1em;
        }

        .input-field {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 1.1em;
            transition: all 0.3s ease;
            resize: vertical;
            min-height: 60px;
        }

        .input-field:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .translate-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .translate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .translate-btn:active {
            transform: translateY(0);
        }

        .translate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result-section {
            margin-top: 30px;
            display: none;
        }

        .result-card {
            background: linear-gradient(135deg, #f8f9ff 0%, #e8f2ff 100%);
            border: 1px solid #667eea;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .result-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .result-label {
            font-weight: bold;
            color: #667eea;
            font-size: 1em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .result-text {
            background: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1em;
            line-height: 1.6;
            border: 1px solid #e1e5e9;
        }

        .english-text {
            color: #333;
            margin-bottom: 20px;
        }

        .kannada-text {
            color: #764ba2;
            font-weight: 500;
            font-family: 'Arial Unicode MS', Arial, sans-serif;
            font-size: 1.2em;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
        }

        .loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .error {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border: 1px solid #ff6b6b;
            color: #d63031;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .success-icon {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: #00b894;
            font-size: 2em;
        }

        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: #5a67d8;
        }

        .history-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #e1e5e9;
        }

        .history-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .history-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .history-item .timestamp {
            font-size: 0.8em;
            color: #999;
            margin-bottom: 8px;
        }

        .history-item .text {
            font-size: 0.9em;
            color: #333;
            margin-bottom: 5px;
        }

        .history-item .translation {
            font-size: 0.9em;
            color: #764ba2;
            font-weight: 500;
        }

        .clear-history {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .clear-history:hover {
            background: #ee5a52;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
                margin: 10px;
            }

            .header h1 {
                font-size: 2em;
            }

            .input-field {
                font-size: 1em;
            }

            .translate-btn {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-language"></i> English to Kannada Translator</h1>
            <p>Translate English text to Kannada instantly</p>
        </div>

        <div class="translator-section">
            <div class="input-group">
                <label for="english-text"><i class="fas fa-edit"></i> English Text</label>
                <textarea
                    id="english-text"
                    class="input-field"
                    placeholder="Enter English text here..."
                    rows="4"></textarea>
            </div>

            <button id="translate-btn" class="translate-btn">
                <i class="fas fa-exchange-alt"></i>
                Translate to Kannada
            </button>

            <div id="loading" class="loading">
                <i class="fas fa-spinner"></i> Translating...
            </div>

            <div id="success-icon" class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>

            <div id="error" class="error"></div>
        </div>

        <div id="result-section" class="result-section">
            <div class="result-card">
                <div class="result-label">English</div>
                <div id="original-text" class="result-text english-text"></div>

                <div class="result-label" style="margin-top: 20px;">ಕನ್ನಡ (Kannada)</div>
                <div id="translated-text" class="result-text kannada-text"></div>

                <button id="copy-btn" class="copy-btn">
                    <i class="fas fa-copy"></i> Copy Translation
                </button>
            </div>
        </div>

        <div class="history-section">
            <div class="history-title">
                <i class="fas fa-history"></i> Translation History
            </div>
            <div id="history-list" class="history-list"></div>
            <button id="clear-history" class="clear-history">
                <i class="fas fa-trash"></i> Clear History
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const translateBtn = document.getElementById('translate-btn');
            const englishText = document.getElementById('english-text');
            const loading = document.getElementById('loading');
            const successIcon = document.getElementById('success-icon');
            const errorDiv = document.getElementById('error');
            const resultSection = document.getElementById('result-section');
            const originalText = document.getElementById('original-text');
            const translatedText = document.getElementById('translated-text');
            const copyBtn = document.getElementById('copy-btn');
            const historyList = document.getElementById('history-list');
            const clearHistoryBtn = document.getElementById('clear-history');

            // Load history from localStorage
            let history = JSON.parse(localStorage.getItem('translationHistory')) || [];

            function updateHistory() {
                historyList.innerHTML = '';
                history.forEach((item, index) => {
                    const historyItem = document.createElement('div');
                    historyItem.className = 'history-item';
                    historyItem.innerHTML = `
                        <div class="timestamp">${item.timestamp}</div>
                        <div class="text">${item.english}</div>
                        <div class="translation">${item.kannada}</div>
                    `;
                    historyList.appendChild(historyItem);
                });
            }

            function addToHistory(english, kannada) {
                const timestamp = new Date().toLocaleString();
                history.unshift({ english, kannada, timestamp });
                if (history.length > 10) {
                    history = history.slice(0, 10);
                }
                localStorage.setItem('translationHistory', JSON.stringify(history));
                updateHistory();
            }

            updateHistory();

            translateBtn.addEventListener('click', async function() {
                const text = englishText.value.trim();

                if (!text) {
                    showError('Please enter some text to translate');
                    return;
                }

                // Show loading
                translateBtn.disabled = true;
                loading.style.display = 'block';
                successIcon.style.display = 'none';
                errorDiv.style.display = 'none';
                resultSection.style.display = 'none';

                try {
                    const response = await fetch('/translate', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ text: text })
                    });

                    const data = await response.json();

                    loading.style.display = 'none';

                    if (data.success) {
                        originalText.textContent = data.original;
                        translatedText.textContent = data.translated;
                        resultSection.style.display = 'block';
                        successIcon.style.display = 'block';

                        // Add to history
                        addToHistory(data.original, data.translated);
                    } else {
                        showError(data.error);
                    }

                } catch (error) {
                    loading.style.display = 'none';
                    showError('Network error. Please try again.');
                }

                translateBtn.disabled = false;
            });

            function showError(message) {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
                loading.style.display = 'none';
            }

            copyBtn.addEventListener('click', function() {
                const text = translatedText.textContent;
                navigator.clipboard.writeText(text).then(function() {
                    const originalText = copyBtn.innerHTML;
                    copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                    setTimeout(() => {
                        copyBtn.innerHTML = originalText;
                    }, 2000);
                });
            });

            clearHistoryBtn.addEventListener('click', function() {
                if (confirm('Are you sure you want to clear all translation history?')) {
                    history = [];
                    localStorage.removeItem('translationHistory');
                    updateHistory();
                }
            });

            // Allow Enter key to trigger translation
            englishText.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    translateBtn.click();
                }
            });
        });
    </script>
</body>
</html>
